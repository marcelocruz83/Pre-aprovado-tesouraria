  <script>
// Mock data for the prototype
const MOCK_DATA = {
  condominios: [
    { id: 1, nome: "Residencial Aurora", cnpj: "12.345.678/0001-90", contrato: "CCB-2026-001234", carteira: "CondoConta", valorTotal: 150000, parcelasPagas: 3, parcelasTotal: 12, proximoVencimento: "2026-05-15", status: "Ativo", saldoResidual: 112500, saldoConta: 45000, contaBloqueada: false },
    { id: 2, nome: "Edifício Monte Verde", cnpj: "23.456.789/0001-01", contrato: "CCB-2026-001235", carteira: "Quista", valorTotal: 250000, parcelasPagas: 5, parcelasTotal: 24, proximoVencimento: "2026-05-01", status: "Em atraso", saldoResidual: 197916.67, saldoConta: 8500, contaBloqueada: false },
    { id: 3, nome: "Condomínio Solar", cnpj: "34.567.890/0001-12", contrato: "CCB-2026-001236", carteira: "CondoConta", valorTotal: 30000, parcelasPagas: 7, parcelasTotal: 7, proximoVencimento: null, status: "Encerrado", saldoResidual: 0, saldoConta: 12000, contaBloqueada: false },
    { id: 4, nome: "Torres do Lago", cnpj: "45.678.901/0001-23", contrato: "CCB-2026-001237", carteira: "Vert", valorTotal: 500000, parcelasPagas: 1, parcelasTotal: 36, proximoVencimento: "2026-04-20", status: "Em atraso", saldoResidual: 486111.11, saldoConta: 0, contaBloqueada: true, motivoBloqueio: "Inadimplência superior a 90 dias" },
    { id: 5, nome: "Vila dos Ipês", cnpj: "56.789.012/0001-34", contrato: "CCB-2026-001238", carteira: "CondoConta", valorTotal: 80000, parcelasPagas: 10, parcelasTotal: 18, proximoVencimento: "2026-06-01", status: "Ativo", saldoResidual: 35555.56, saldoConta: 22000, contaBloqueada: false },
    { id: 6, nome: "Parque das Flores", cnpj: "67.890.123/0001-45", contrato: "CCB-2026-001239", carteira: "Quista", valorTotal: 120000, parcelasPagas: 2, parcelasTotal: 12, proximoVencimento: "2026-05-10", status: "Ativo", saldoResidual: 100000, saldoConta: 15000, contaBloqueada: false },
    { id: 7, nome: "Edifício Primavera", cnpj: "78.901.234/0001-56", contrato: "CCB-2026-001240", carteira: "Vert", valorTotal: 200000, parcelasPagas: 0, parcelasTotal: 24, proximoVencimento: "2026-04-25", status: "Bloqueado", saldoResidual: 200000, saldoConta: 0, contaBloqueada: true, motivoBloqueio: "Pendência documental" },
  ],
  // Generate parcelas for a given condominio
  getParcelas: function(condId) {
    const cond = this.condominios.find(c => c.id === condId);
    if (!cond) return [];
    const valorParcela = cond.valorTotal / cond.parcelasTotal;
    const parcelas = [];
    const startDate = new Date('2025-10-15');
    for (let i = 0; i < cond.parcelasTotal; i++) {
      const venc = new Date(startDate);
      venc.setMonth(venc.getMonth() + i);
      const isPago = i < cond.parcelasPagas;
      const isAtraso = !isPago && venc < new Date('2026-04-22');
      const isParcial = (condId === 2 && i === cond.parcelasPagas); // one partial for Monte Verde
      const juros = isAtraso ? valorParcela * 0.02 * Math.ceil((new Date('2026-04-22') - venc) / (1000*60*60*24*30)) : 0;
      const multa = isAtraso ? valorParcela * 0.02 : 0;
      const valorPago = isPago ? valorParcela : (isParcial ? 5000 : 0);
      const saldoRes = valorParcela + juros + multa - valorPago;
      const statusOmie = isPago ? 'sincronizado' : (isParcial ? 'divergente' : (Math.random() > 0.3 ? 'sincronizado' : 'nao_sincronizado'));
      let status = 'A vencer';
      if (isPago) status = 'Pago';
      else if (isParcial) status = 'Parcialmente pago';
      else if (isAtraso) status = 'Em atraso';
      else if (cond.contaBloqueada) status = 'Bloqueado';
      parcelas.push({
        id: `${condId}-${i+1}`,
        numero: `${String(i+1).padStart(3,'0')}/${String(cond.parcelasTotal).padStart(3,'0')}`,
        vencimento: venc.toISOString().split('T')[0],
        valorOriginal: valorParcela,
        juros: juros,
        multa: multa,
        valorTotal: valorParcela + juros + multa,
        valorPago: valorPago,
        saldoResidual: Math.max(0, saldoRes),
        status: status,
        statusOmie: statusOmie,
        diasAtraso: isAtraso ? Math.ceil((new Date('2026-04-22') - venc) / (1000*60*60*24)) : 0
      });
    }
    return parcelas;
  },
  getHistorico: function(parcelaId) {
    const [condId, parcelaNum] = parcelaId.split('-').map(Number);
    const cond = this.condominios.find(c => c.id === condId);
    if (!cond) return [];
    const valorParcela = cond.valorTotal / cond.parcelasTotal;
    const eventos = [];
    if (parcelaNum <= cond.parcelasPagas) {
      eventos.push({ data: '2026-03-15 10:32:00', tipo: 'Automática', operador: 'Sistema', valorDebitado: valorParcela, juros: 0, multa: 0, desconto: 0, saldoResidualApos: 0, statusOmie: 'sincronizado' });
    }
    if (condId === 2 && parcelaNum === cond.parcelasPagas + 1) {
      eventos.push({ data: '2026-04-10 14:20:00', tipo: 'Manual', operador: 'Júlia Santos', valorDebitado: 5000, juros: 0, multa: 0, desconto: 0, saldoResidualApos: valorParcela - 5000, statusOmie: 'divergente' });
    }
    return eventos;
  },
  conciliacao: [
    { condominio: "Residencial Aurora", contrato: "CCB-2026-001234", parcela: "003/012", statusCS: "Pago", statusOmie: "Pago", divergencia: false, valorCS: 12500, valorOmie: 12500 },
    { condominio: "Edifício Monte Verde", contrato: "CCB-2026-001235", parcela: "006/024", statusCS: "Parcialmente pago", statusOmie: "Em aberto", divergencia: true, valorCS: 5000, valorOmie: 0 },
    { condominio: "Edifício Monte Verde", contrato: "CCB-2026-001235", parcela: "007/024", statusCS: "Em atraso", statusOmie: "Em aberto", divergencia: false, valorCS: 0, valorOmie: 0 },
    { condominio: "Torres do Lago", contrato: "CCB-2026-001237", parcela: "002/036", statusCS: "Em atraso", statusOmie: "—", divergencia: true, valorCS: 13888.89, valorOmie: 0 },
    { condominio: "Vila dos Ipês", contrato: "CCB-2026-001238", parcela: "010/018", statusCS: "Pago", statusOmie: "Pago", divergencia: false, valorCS: 4444.44, valorOmie: 4444.44 },
    { condominio: "Parque das Flores", contrato: "CCB-2026-001239", parcela: "003/012", statusCS: "A vencer", statusOmie: "—", divergencia: true, valorCS: 10000, valorOmie: 0 },
    { condominio: "Edifício Primavera", contrato: "CCB-2026-001240", parcela: "001/024", statusCS: "Bloqueado", statusOmie: "—", divergencia: true, valorCS: 8333.33, valorOmie: 0 },
  ]
};
window.MOCK_DATA = MOCK_DATA;

</script>

<body>

  <script type="text/babel">
// Shared components and utilities

const formatBRL = (v) => v == null ? '—' : v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
const formatDate = (d) => { if (!d) return '—'; const p = d.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; };

// ── Collapsed Sidebar (minimal) ──
function SidebarMin({ onCollapse }) {
  const menuItems = [
    { icon: '📋', label: 'Documentos' }, { icon: '🏦', label: 'Contas' }, { icon: '📊', label: 'Gestão de Recebíveis' },
    { icon: '💰', label: 'Financeiro' }, { icon: '💳', label: 'Crédito', active: true },
    { icon: '🏢', label: 'Entidades do Sistema' }, { icon: '📧', label: 'Comunicação' },
  ];
  return (
    <div style={{ width: 56, minWidth: 56, background: '#1a2332', color: '#fff', height: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', paddingTop: 16 }}>
      <div style={{ fontSize: 11, fontWeight: 700, marginBottom: 20, letterSpacing: '-0.02em', color: 'rgba(255,255,255,0.9)' }}>CS</div>
      {menuItems.map((m, i) => (
        <div key={i} title={m.label} style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: 8, marginBottom: 4, cursor: 'pointer', fontSize: 16, background: m.active ? '#2563eb' : 'transparent' }}>{m.icon}</div>
      ))}
    </div>
  );
}

// ── Top bar ──
function TopBar() {
  return (
    <div style={{ height: 56, borderBottom: '1px solid #e5e7eb', display: 'flex', alignItems: 'center', justifyContent: 'flex-end', padding: '0 24px', flexShrink: 0 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{ width: 34, height: 34, borderRadius: '50%', background: '#1a2332', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 600 }}>JS</div>
        <span style={{ fontSize: 13.5, color: '#374151' }}>Júlia Santos</span>
        <span style={{ fontSize: 10, color: '#9ca3af' }}>▼</span>
      </div>
    </div>
  );
}

// ── KPI Card ──
function KPICard({ label, value, color, icon }) {
  const bgMap = { blue: '#eff6ff', green: '#f0fdf4', red: '#fef2f2', orange: '#fff7ed', purple: '#faf5ff' };
  const fgMap = { blue: '#2563eb', green: '#16a34a', red: '#dc2626', orange: '#ea580c', purple: '#9333ea' };
  return (
    <div style={{ flex: 1, background: '#fff', border: '1px solid #e5e7eb', borderRadius: 10, padding: '18px 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
      <div>
        <div style={{ fontSize: 12.5, color: '#6b7280', marginBottom: 6 }}>{label}</div>
        <div style={{ fontSize: 26, fontWeight: 700, color: '#111827' }}>{value}</div>
      </div>
      <div style={{ width: 38, height: 38, borderRadius: '50%', background: bgMap[color] || bgMap.blue, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, color: fgMap[color] || fgMap.blue }}>
        {icon}
      </div>
    </div>
  );
}

// ── Status Badge ──
function StatusBadge({ status, small }) {
  const map = {
    'Ativo': { bg: '#dcfce7', color: '#15803d' },
    'Em atraso': { bg: '#fef2f2', color: '#dc2626' },
    'Encerrado': { bg: '#f3f4f6', color: '#6b7280' },
    'Bloqueado': { bg: '#fef2f2', color: '#dc2626' },
    'A vencer': { bg: '#eff6ff', color: '#2563eb' },
    'Pago': { bg: '#dcfce7', color: '#15803d' },
    'Parcialmente pago': { bg: '#fff7ed', color: '#ea580c' },
    'Em aberto': { bg: '#fff7ed', color: '#ea580c' },
  };
  const s = map[status] || { bg: '#f3f4f6', color: '#6b7280' };
  return (
    <span style={{ display: 'inline-block', padding: small ? '2px 8px' : '3px 10px', borderRadius: 20, fontSize: small ? 11 : 12, fontWeight: 600, background: s.bg, color: s.color, whiteSpace: 'nowrap' }}>
      {status}
    </span>
  );
}

// ── Omie Status Icon ──
function OmieStatus({ status }) {
  if (status === 'sincronizado') return <span style={{color: '#16a34a', fontSize: 13}}>✅ Sincronizado</span>;
  if (status === 'divergente') return <span style={{color: '#ea580c', fontSize: 13}}>⚠️ Divergente</span>;
  return <span style={{color: '#dc2626', fontSize: 13}}>❌ Não sincronizado</span>;
}

// ── Tabs ──
function Tabs({ tabs, active, onChange }) {
  return (
    <div style={{ display: 'flex', gap: 0, borderBottom: '1px solid #e5e7eb', marginBottom: 24 }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => onChange(t.id)} style={{
          padding: '10px 20px', fontSize: 13.5, fontWeight: active === t.id ? 600 : 400,
          color: active === t.id ? '#111827' : '#6b7280', background: 'none', border: 'none',
          borderBottom: active === t.id ? '2px solid #2563eb' : '2px solid transparent',
          cursor: 'pointer', transition: 'all 0.15s'
        }}>{t.label}</button>
      ))}
    </div>
  );
}

// ── Confirmation Modal ──
function ConfirmModal({ open, title, children, onConfirm, onCancel, confirmLabel, confirmColor }) {
  if (!open) return null;
  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.4)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }} onClick={onCancel}>
      <div style={{ background: '#fff', borderRadius: 12, padding: '28px 32px', maxWidth: 520, width: '90%', boxShadow: '0 20px 60px rgba(0,0,0,0.2)' }} onClick={e => e.stopPropagation()}>
        <h3 style={{ margin: '0 0 16px', fontSize: 17, fontWeight: 600, color: '#111827' }}>{title}</h3>
        <div style={{ fontSize: 13.5, color: '#374151', lineHeight: 1.6 }}>{children}</div>
        <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 24 }}>
          <button onClick={onCancel} style={{ padding: '9px 20px', borderRadius: 8, border: '1px solid #d1d5db', background: '#fff', fontSize: 13, cursor: 'pointer', color: '#374151' }}>Cancelar</button>
          <button onClick={onConfirm} style={{ padding: '9px 20px', borderRadius: 8, border: 'none', background: confirmColor || '#2563eb', color: '#fff', fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>{confirmLabel || 'Confirmar'}</button>
        </div>
      </div>
    </div>
  );
}

// ── Toast ──
function Toast({ message, type, onClose }) {
  if (!message) return null;
  const bg = type === 'success' ? '#dcfce7' : '#fef2f2';
  const color = type === 'success' ? '#15803d' : '#dc2626';
  const icon = type === 'success' ? '✓' : '✕';
  React.useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, [message]);
  return (
    <div style={{ position: 'fixed', top: 20, right: 20, background: bg, color, padding: '12px 20px', borderRadius: 10, fontSize: 13.5, fontWeight: 500, zIndex: 2000, boxShadow: '0 4px 20px rgba(0,0,0,0.12)', display: 'flex', alignItems: 'center', gap: 8, animation: 'fadeIn 0.2s ease' }}>
      <span style={{ fontWeight: 700, fontSize: 15 }}>{icon}</span> {message}
    </div>
  );
}

// ── Filter input ──
function FilterInput({ value, onChange, placeholder }) {
  return (
    <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
      style={{ padding: '9px 14px', borderRadius: 8, border: '1px solid #d1d5db', fontSize: 13, outline: 'none', width: '100%', background: '#fff', color: '#374151' }} />
  );
}

// ── Select ──
function FilterSelect({ value, onChange, options, placeholder }) {
  return (
    <select value={value} onChange={e => onChange(e.target.value)}
      style={{ padding: '9px 14px', borderRadius: 8, border: '1px solid #d1d5db', fontSize: 13, outline: 'none', background: '#fff', color: value ? '#374151' : '#9ca3af', minWidth: 160 }}>
      <option value="">{placeholder}</option>
      {options.map(o => <option key={o} value={o}>{o}</option>)}
    </select>
  );
}

// ── Page header ──
function PageHeader({ title, subtitle, breadcrumbs, onBreadcrumb }) {
  return (
    <div style={{ marginBottom: 20 }}>
      {breadcrumbs && (
        <div style={{ display: 'flex', gap: 6, fontSize: 12.5, color: '#9ca3af', marginBottom: 8 }}>
          {breadcrumbs.map((b, i) => (
            <React.Fragment key={i}>
              {i > 0 && <span>/</span>}
              <span style={{ cursor: b.onClick ? 'pointer' : 'default', color: b.onClick ? '#2563eb' : undefined }} onClick={b.onClick}>{b.label}</span>
            </React.Fragment>
          ))}
        </div>
      )}
      <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: '#111827' }}>{title}</h1>
      {subtitle && <p style={{ margin: '4px 0 0', fontSize: 13.5, color: '#6b7280' }}>{subtitle}</p>}
    </div>
  );
}

// ── Main Tabs (top-level like the screenshots) ──
function MainTabs({ active, onChange }) {
  const tabs = ['Visão Geral', 'Fila C&R', 'Condomínios', 'Contratos'];
  return (
    <div style={{ display: 'flex', gap: 0, borderBottom: '1px solid #e5e7eb' }}>
      {tabs.map(t => {
        const id = t.toLowerCase().replace(/[^a-z]/g, '');
        const isActive = active === id;
        return (
          <button key={id} onClick={() => onChange(id)} style={{
            padding: '11px 22px', fontSize: 13.5, fontWeight: isActive ? 600 : 400,
            color: isActive ? '#111827' : '#6b7280', background: 'none', border: 'none',
            borderBottom: isActive ? '2px solid #2563eb' : '2px solid transparent',
            cursor: 'pointer', transition: 'all 0.15s'
          }}>{t}</button>
        );
      })}
    </div>
  );
}

// ── Sub tabs within Contratos ──
function SubTabs({ active, onChange }) {
  const tabs = [{id:'lista',label:'Lista de Contratos'},{id:'conciliacao',label:'Conciliação'},{id:'relatorios',label:'Relatórios'}];
  return (
    <div style={{ display: 'flex', gap: 6, marginBottom: 20 }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => onChange(t.id)} style={{
          padding: '7px 16px', borderRadius: 20, fontSize: 12.5, fontWeight: active === t.id ? 600 : 400,
          color: active === t.id ? '#fff' : '#6b7280',
          background: active === t.id ? '#2563eb' : '#f3f4f6',
          border: 'none', cursor: 'pointer', transition: 'all 0.15s'
        }}>{t.label}</button>
      ))}
    </div>
  );
}

Object.assign(window, { formatBRL, formatDate, SidebarMin, TopBar, KPICard, StatusBadge, OmieStatus, Tabs, ConfirmModal, Toast, FilterInput, FilterSelect, PageHeader, MainTabs, SubTabs });

</script>
  <script type="text/babel">
// Tela 1 — Lista de Financiamentos
function TelaLista({ onSelectCond, onNavigate }) {
  const [search, setSearch] = React.useState('');
  const [statusFilter, setStatusFilter] = React.useState('');
  const [carteiraFilter, setCarteiraFilter] = React.useState('');
  const [dateFrom, setDateFrom] = React.useState('');
  const [dateTo, setDateTo] = React.useState('');
  const data = window.MOCK_DATA.condominios;

  const filtered = data.filter(c => {
    if (search && !c.nome.toLowerCase().includes(search.toLowerCase()) && !c.cnpj.includes(search)) return false;
    if (statusFilter && c.status !== statusFilter) return false;
    if (carteiraFilter && c.carteira !== carteiraFilter) return false;
    if (dateFrom && c.proximoVencimento && c.proximoVencimento < dateFrom) return false;
    if (dateTo && c.proximoVencimento && c.proximoVencimento > dateTo) return false;
    return true;
  });

  const ativos = filtered.filter(c => c.status === 'Ativo').length;
  const volumeAberto = filtered.filter(c => c.status !== 'Encerrado').reduce((s, c) => s + c.saldoResidual, 0);
  const emAtraso = filtered.filter(c => c.status === 'Em atraso').length;
  const comResidual = filtered.filter(c => c.saldoResidual > 0 && c.status !== 'Encerrado').length;

  return (
    <div>
      <PageHeader title="Financiamentos / Pré-aprovado" subtitle="Gestão de quitação de parcelas de financiamento" />

                onMouseEnter={e => e.currentTarget.style.background='#f9fafb'}

                onClick={() => onSelectCond(c.id)}>
                <td style={{ padding: '12px 14px' }}>

                </td>

                <td style={{ padding: '12px 14px', color: '#374151' }}>{c.parcelasPagas}/{c.parcelasTotal}</td>
                <td style={{ padding: '12px 14px', color: '#374151' }}>{c.proximoVencimento ? formatDate(c.proximoVencimento) : '—'}</td>
                <td style={{ padding: '12px 14px' }}><StatusBadge status={c.status} small /></td>
                <td style={{ padding: '12px 14px', color: '#374151', fontVariantNumeric: 'tabular-nums' }}>{formatBRL(c.saldoResidual)}</td>
                <td style={{ padding: '12px 14px' }}>
                  <button style={{ padding: '5px 12px', borderRadius: 6, border: '1px solid #d1d5db', background: '#fff', fontSize: 12, cursor: 'pointer', color: '#2563eb', fontWeight: 500, whiteSpace: 'nowrap' }}>Ver detalhes</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {filtered.length === 0 && <div style={{ padding: 40, textAlign: 'center', color: '#9ca3af', fontSize: 13 }}>Nenhum financiamento encontrado.</div>}
      </div>
    </div>
  );
}

  <script type="text/babel">
// Tela 3 — Modal Realizar Cobrança
function TelaCobranca({ cond, parcela, onClose, onSuccess }) {
  const [juros, setJuros] = React.useState(parcela.juros);
  const [multa, setMulta] = React.useState(parcela.multa);
  const [desconto, setDesconto] = React.useState(0);
  const [baixarOmie, setBaixarOmie] = React.useState(true);
  const [showConfirm, setShowConfirm] = React.useState(false);
  const [tipoCobranca, setTipoCobranca] = React.useState(null);
  const [valorParcial, setValorParcial] = React.useState(cond.saldoConta);

  const valorTotal = parcela.valorOriginal + juros + multa - desconto - parcela.valorPago;
  const saldoConta = cond.saldoConta;
  const isIntegral = saldoConta >= valorTotal;
  const isParcial = saldoConta > 0 && saldoConta < valorTotal;
  const semSaldo = saldoConta === 0;

  const handleConfirm = () => {
    setShowConfirm(false);
    onSuccess(tipoCobranca === 'sem_cobranca' ? 'Baixa sem cobrança registrada com sucesso.' : 'Cobrança realizada com sucesso!');
  };

  const initConfirm = (tipo) => {
    setTipoCobranca(tipo);
    setShowConfirm(true);
  };

  const valorDebito = tipoCobranca === 'integral' ? valorTotal : tipoCobranca === 'parcial' ? Math.min(valorParcial, saldoConta) : 0;
  const saldoResApos = valorTotal - valorDebito;

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 900, overflowY: 'auto', padding: 20 }} onClick={onClose}>
      <div style={{ background: '#fff', borderRadius: 14, width: '100%', maxWidth: 620, boxShadow: '0 24px 80px rgba(0,0,0,0.2)', maxHeight: '90vh', overflowY: 'auto' }} onClick={e => e.stopPropagation()}>
        <div style={{ padding: '24px 28px 0' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: '#111827' }}>Realizar Cobrança</h2>
            <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 20, cursor: 'pointer', color: '#9ca3af', padding: 4 }}>✕</button>
          </div>

          {/* Info block */}
          <div style={{ background: '#f9fafb', borderRadius: 8, padding: 16, marginBottom: 20, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, fontSize: 13 }}>
            <div><span style={{ color: '#6b7280' }}>Condomínio:</span> <strong>{cond.nome}</strong></div>
            <div><span style={{ color: '#6b7280' }}>CNPJ:</span> <strong>{cond.cnpj}</strong></div>
            <div><span style={{ color: '#6b7280' }}>Parcela:</span> <strong>{parcela.numero}</strong></div>
            <div><span style={{ color: '#6b7280' }}>Vencimento:</span> <strong>{formatDate(parcela.vencimento)}</strong></div>
            {parcela.diasAtraso > 0 && <div><span style={{ color: '#6b7280' }}>Dias de atraso:</span> <strong style={{ color: '#dc2626' }}>{parcela.diasAtraso} dias</strong></div>}
            <div><span style={{ color: '#6b7280' }}>Saldo em conta:</span> <strong style={{ color: saldoConta > 0 ? '#16a34a' : '#dc2626' }}>{formatBRL(saldoConta)}</strong></div>
          </div>

          {cond.contaBloqueada && (
            <div style={{ background: '#fef2f2', border: '1px solid #fecaca', borderRadius: 8, padding: '12px 16px', marginBottom: 20, display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ fontSize: 18 }}>🔒</span>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, color: '#dc2626' }}>Conta Bloqueada — Débito não permitido</div>
                <div style={{ fontSize: 12, color: '#b91c1c' }}>{cond.motivoBloqueio}</div>
              </div>
            </div>
          )}

          {/* Campos financeiros */}
          <div style={{ marginBottom: 20 }}>
            <h4 style={{ fontSize: 13, fontWeight: 600, color: '#374151', margin: '0 0 12px' }}>Valores da cobrança</h4>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              <FieldReadonly label="Valor original" value={formatBRL(parcela.valorOriginal)} />
              <FieldEditable label="Juros calculados" value={juros} onChange={setJuros} hint="Edite para isenção" />
              <FieldEditable label="Multa calculada" value={multa} onChange={setMulta} hint="Edite para isenção" />
              <FieldEditable label="Desconto" value={desconto} onChange={setDesconto} />
              {parcela.valorPago > 0 && <FieldReadonly label="Já pago" value={formatBRL(parcela.valorPago)} color="#16a34a" />}
              <div style={{ gridColumn: '1/-1', background: '#f0f9ff', borderRadius: 8, padding: '12px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span style={{ fontSize: 14, fontWeight: 600, color: '#1e40af' }}>Valor total a cobrar</span>
                <span style={{ fontSize: 20, fontWeight: 700, color: '#1e40af', fontVariantNumeric: 'tabular-nums' }}>{formatBRL(Math.max(0, valorTotal))}</span>
              </div>
            </div>
          </div>

          {/* Lógica de baixa */}
          {!cond.contaBloqueada && (
            <div style={{ marginBottom: 24 }}>
              {isIntegral && (
                <div style={{ background: '#f0fdf4', border: '1px solid #bbf7d0', borderRadius: 8, padding: 16 }}>
                  <div style={{ fontSize: 13, color: '#15803d', fontWeight: 500, marginBottom: 10 }}>✓ Saldo suficiente para cobrança integral</div>
                  <button onClick={() => initConfirm('integral')} style={primaryBtnS}>Realizar Cobrança Integral</button>
                </div>
              )}
              {isParcial && (
                <div style={{ background: '#fff7ed', border: '1px solid #fed7aa', borderRadius: 8, padding: 16 }}>
                  <div style={{ fontSize: 13, color: '#ea580c', fontWeight: 500, marginBottom: 6 }}>⚠ Saldo insuficiente para cobrança integral</div>
                  <div style={{ fontSize: 12, color: '#9a3412', marginBottom: 12 }}>Deseja realizar baixa parcial?</div>
                  <div style={{ display: 'flex', gap: 12, alignItems: 'flex-end', marginBottom: 12 }}>
                    <div style={{ flex: 1 }}>
                      <label style={{ fontSize: 11, color: '#6b7280', display: 'block', marginBottom: 4 }}>Valor do débito parcial</label>
                      <input type="number" value={valorParcial} onChange={e => setValorParcial(Math.min(Number(e.target.value), saldoConta))} style={inputS} />
                    </div>
                    <div style={{ flex: 1 }}>
                      <label style={{ fontSize: 11, color: '#6b7280', display: 'block', marginBottom: 4 }}>Saldo residual após baixa</label>
                      <div style={{ padding: '9px 12px', fontSize: 14, fontWeight: 600, color: '#ea580c', fontVariantNumeric: 'tabular-nums' }}>{formatBRL(valorTotal - Math.min(valorParcial, saldoConta))}</div>
                    </div>
                  </div>
                  <button onClick={() => initConfirm('parcial')} style={{...primaryBtnS, background: '#ea580c'}}>Realizar Cobrança Parcial</button>
                </div>
              )}
              {semSaldo && (
                <div style={{ background: '#f9fafb', border: '1px solid #e5e7eb', borderRadius: 8, padding: 16 }}>
                  <div style={{ fontSize: 13, color: '#6b7280', fontWeight: 500, marginBottom: 10 }}>Sem saldo disponível para débito</div>
                  <button onClick={() => initConfirm('sem_cobranca')} style={{...primaryBtnS, background: '#6b7280'}}>Efetuar Baixa sem Cobrança</button>
                </div>
              )}
              {!semSaldo && (
                <button onClick={() => initConfirm('sem_cobranca')} style={{ marginTop: 10, padding: '8px 16px', borderRadius: 7, border: '1px solid #d1d5db', background: '#fff', fontSize: 12.5, cursor: 'pointer', color: '#6b7280' }}>
                  Efetuar baixa sem cobrança (apenas registrar)
                </button>
              )}
            </div>
          )}
        </div>

        {/* Checkbox Omie */}
        <div style={{ padding: '16px 28px', borderTop: '1px solid #e5e7eb', background: '#f9fafb', borderRadius: '0 0 14px 14px' }}>
          <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: '#374151', cursor: 'pointer' }}>
            <input type="checkbox" checked={baixarOmie} onChange={e => setBaixarOmie(e.target.checked)} />
            Baixar também no Omie
          </label>
        </div>
      </div>

      {/* Confirmation */}
      <ConfirmModal open={showConfirm} title="Confirmar operação" onCancel={() => setShowConfirm(false)} onConfirm={handleConfirm} confirmLabel="Confirmar">
        <div style={{ display: 'grid', gap: 8 }}>
          <div><strong>Condomínio:</strong> {cond.nome}</div>
          <div><strong>Parcela:</strong> {parcela.numero}</div>
          <div><strong>Tipo:</strong> {tipoCobranca === 'integral' ? 'Cobrança integral' : tipoCobranca === 'parcial' ? 'Cobrança parcial' : 'Baixa sem cobrança'}</div>
          <div><strong>Valor a debitar:</strong> {formatBRL(valorDebito)}</div>
          {saldoResApos > 0 && <div><strong>Saldo residual após:</strong> {formatBRL(saldoResApos)}</div>}
          <div><strong>Sincronizar Omie:</strong> {baixarOmie ? 'Sim' : 'Não'}</div>
        </div>
      </ConfirmModal>
    </div>
  );
}

function FieldReadonly({ label, value, color }) {
  return (
    <div>
      <label style={{ fontSize: 11, color: '#6b7280', display: 'block', marginBottom: 4 }}>{label}</label>
      <div style={{ padding: '9px 12px', background: '#f9fafb', borderRadius: 6, border: '1px solid #e5e7eb', fontSize: 14, fontWeight: 500, color: color || '#111827', fontVariantNumeric: 'tabular-nums' }}>{value}</div>
    </div>
  );
}

function FieldEditable({ label, value, onChange, hint }) {
  return (
    <div>
      <label style={{ fontSize: 11, color: '#6b7280', display: 'block', marginBottom: 4 }}>{label} {hint && <span style={{ color: '#9ca3af' }}>({hint})</span>}</label>
      <input type="number" value={value} onChange={e => onChange(Number(e.target.value))} step="0.01" min="0" style={inputS} />
    </div>
  );
}

const inputS = { padding: '9px 12px', borderRadius: 6, border: '1px solid #d1d5db', fontSize: 14, width: '100%', boxSizing: 'border-box', fontVariantNumeric: 'tabular-nums', outline: 'none' };
const primaryBtnS = { padding: '10px 22px', borderRadius: 8, border: 'none', background: '#2563eb', color: '#fff', fontSize: 13.5, fontWeight: 600, cursor: 'pointer' };

window.TelaCobranca = TelaCobranca;

</script>

      <div style={{ background: '#fff', borderRadius: 14, width: '100%', maxWidth: 700, boxShadow: '0 24px 80px rgba(0,0,0,0.2)', maxHeight: '85vh', overflowY: 'auto' }} onClick={e => e.stopPropagation()}>
        <div style={{ padding: '24px 28px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <div>
              <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: '#111827' }}>Histórico de Baixas</h2>

            </div>
            <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 20, cursor: 'pointer', color: '#9ca3af' }}>✕</button>
          </div>

          {/* Totais */}
          <div style={{ display: 'flex', gap: 14, marginBottom: 24 }}>
            <div style={{ flex: 1, background: '#f0fdf4', borderRadius: 8, padding: '14px 16px' }}>
              <div style={{ fontSize: 11, color: '#6b7280' }}>Total pago</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: '#15803d', fontVariantNumeric: 'tabular-nums' }}>{formatBRL(totalPago)}</div>
            </div>
            <div style={{ flex: 1, background: '#fff7ed', borderRadius: 8, padding: '14px 16px' }}>
              <div style={{ fontSize: 11, color: '#6b7280' }}>Saldo residual</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: '#ea580c', fontVariantNumeric: 'tabular-nums' }}>{formatBRL(parcela.saldoResidual)}</div>
            </div>
            <div style={{ flex: 1, background: '#f9fafb', borderRadius: 8, padding: '14px 16px' }}>
              <div style={{ fontSize: 11, color: '#6b7280' }}>Baixas realizadas</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: '#111827' }}>{eventos.length}</div>
            </div>
          </div>

          {/* Timeline */}
          {eventos.length === 0 ? (
            <div style={{ padding: 40, textAlign: 'center', color: '#9ca3af', fontSize: 13 }}>Nenhuma baixa registrada para esta parcela.</div>
          ) : (
            <div style={{ position: 'relative', paddingLeft: 24 }}>
              <div style={{ position: 'absolute', left: 7, top: 8, bottom: 8, width: 2, background: '#e5e7eb' }} />
              {eventos.map((ev, i) => (
                <div key={i} style={{ position: 'relative', marginBottom: 20, paddingLeft: 20 }}>
                  <div style={{ position: 'absolute', left: -20, top: 4, width: 14, height: 14, borderRadius: '50%', background: ev.tipo === 'Automática' ? '#2563eb' : '#ea580c', border: '3px solid #fff', boxShadow: '0 0 0 2px #e5e7eb' }} />
                  <div style={{ background: '#f9fafb', borderRadius: 8, padding: '14px 18px' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8, flexWrap: 'wrap', gap: 8 }}>
                      <span style={{ fontSize: 12, color: '#6b7280' }}>{ev.data}</span>
                      <span style={{ fontSize: 11, padding: '1px 8px', borderRadius: 4, background: ev.tipo === 'Automática' ? '#eff6ff' : '#fff7ed', color: ev.tipo === 'Automática' ? '#2563eb' : '#ea580c', fontWeight: 500 }}>{ev.tipo}</span>
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: 8, fontSize: 12.5 }}>
                      <div><span style={{ color: '#9ca3af' }}>Operador:</span> <strong>{ev.operador}</strong></div>
                      <div><span style={{ color: '#9ca3af' }}>Debitado:</span> <strong style={{ color: '#15803d' }}>{formatBRL(ev.valorDebitado)}</strong></div>
                      <div><span style={{ color: '#9ca3af' }}>Juros:</span> <strong>{formatBRL(ev.juros)}</strong></div>
                      <div><span style={{ color: '#9ca3af' }}>Multa:</span> <strong>{formatBRL(ev.multa)}</strong></div>
                      <div><span style={{ color: '#9ca3af' }}>Desconto:</span> <strong>{formatBRL(ev.desconto)}</strong></div>
                      <div><span style={{ color: '#9ca3af' }}>Saldo após:</span> <strong>{formatBRL(ev.saldoResidualApos)}</strong></div>
                      <div><span style={{ color: '#9ca3af' }}>Omie:</span> <OmieStatus status={ev.statusOmie} /></div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

window.TelaHistorico = TelaHistorico;

</script>
  <script type="text/babel">
// Tela 5 — Conciliação + Tela 6 — Relatórios

function TelaConciliacao() {
  const [syncFilter, setSyncFilter] = React.useState('');
  const [dateFrom, setDateFrom] = React.useState('');
  const [dateTo, setDateTo] = React.useState('');
  const data = window.MOCK_DATA.conciliacao;
  const filtered = data.filter(d => {
    if (syncFilter === 'divergente' && !d.divergencia) return false;
    if (syncFilter === 'sincronizado' && d.divergencia) return false;
    return true;
  });
  const totalSync = filtered.filter(d => !d.divergencia).length;
  const totalDiv = filtered.filter(d => d.divergencia).length;
  const totalNaoSync = filtered.filter(d => d.statusOmie === '—').length;

  return (
    <div>
      <PageHeader title="Conciliação" subtitle="Sincronização entre CondoSuite e Omie" />
      <div style={{ display: 'flex', gap: 14, marginBottom: 24, flexWrap: 'wrap' }}>
        <KPICard label="Sincronizadas" value={`${filtered.length ? Math.round(totalSync/filtered.length*100) : 0}%`} color="green" icon="✓" />
        <KPICard label="Divergentes" value={totalDiv} color="orange" icon="⚠" />
        <KPICard label="Não sincronizadas" value={totalNaoSync} color="red" icon="✕" />
      </div>
      <div style={{ display: 'flex', gap: 12, marginBottom: 16, flexWrap: 'wrap' }}>
        <FilterSelect value={syncFilter} onChange={setSyncFilter} options={['divergente','sincronizado']} placeholder="Filtrar sincronização" />
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{ fontSize: 12, color: '#6b7280' }}>De</span>
          <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} style={{ padding: '9px 12px', borderRadius: 8, border: '1px solid #d1d5db', fontSize: 13, outline: 'none', background: '#fff', color: '#374151' }} />
          <span style={{ fontSize: 12, color: '#6b7280' }}>Até</span>
          <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} style={{ padding: '9px 12px', borderRadius: 8, border: '1px solid #d1d5db', fontSize: 13, outline: 'none', background: '#fff', color: '#374151' }} />
        </div>
      </div>
      <div style={{ background: '#fff', border: '1px solid #e5e7eb', borderRadius: 10, overflow: 'hidden' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12.5 }}>
          <thead>
            <tr style={{ background: '#f9fafb' }}>
              {['Condomínio','Contrato','Parcela','Status CondoSuite','Status Omie','Divergência','Valor CS','Valor Omie','Ação'].map((h,i) => (
                <th key={i} style={{ padding: '10px 12px', textAlign: 'left', fontWeight: 600, color: '#6b7280', fontSize: 10.5, textTransform: 'uppercase', letterSpacing: '0.04em', borderBottom: '1px solid #e5e7eb', whiteSpace: 'nowrap' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((r, i) => (
              <tr key={i} style={{ borderBottom: '1px solid #f3f4f6' }}>
                <td style={concTd}>{r.condominio}</td>
                <td style={concTd}>{r.contrato}</td>
                <td style={concTd}>{r.parcela}</td>
                <td style={concTd}><StatusBadge status={r.statusCS} small /></td>
                <td style={concTd}>{r.statusOmie === '—' ? <span style={{color:'#9ca3af'}}>—</span> : <StatusBadge status={r.statusOmie} small />}</td>
                <td style={concTd}>
                  {r.divergencia ? <span style={{color:'#dc2626',fontWeight:600,fontSize:12}}>Sim</span> : <span style={{color:'#16a34a',fontSize:12}}>Não</span>}
                </td>
                <td style={{...concTd, fontVariantNumeric: 'tabular-nums'}}>{formatBRL(r.valorCS)}</td>
                <td style={{...concTd, fontVariantNumeric: 'tabular-nums', color: r.valorOmie !== r.valorCS ? '#dc2626' : '#374151'}}>{formatBRL(r.valorOmie)}</td>
                <td style={concTd}>
                  {r.divergencia && <button style={{ padding: '4px 10px', borderRadius: 5, border: '1px solid #bfdbfe', background: '#eff6ff', fontSize: 11, cursor: 'pointer', color: '#2563eb', fontWeight: 500 }}>Sincronizar</button>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}
const concTd = { padding: '10px 12px', color: '#374151' };

            <input type="date" style={{ padding: '9px 14px', borderRadius: 8, border: '1px solid #d1d5db', fontSize: 13 }} />

            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12.5 }}>
              <thead>
                <tr style={{ background: '#f9fafb' }}>
                  {['Condomínio','Contrato','Parcela','Vencimento','Pagamento','Valor original','Encargos','Valor pago','Saldo residual','Tipo','Operador'].map((h,i) => (
                    <th key={i} style={{ padding: '10px 10px', textAlign: 'left', fontWeight: 600, color: '#6b7280', fontSize: 10, textTransform: 'uppercase', borderBottom: '1px solid #e5e7eb', whiteSpace: 'nowrap' }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {[
                  ['Residencial Aurora','CCB-2026-001234','003/012','15/01/2026','15/03/2026','R$ 12.500','R$ 0','R$ 12.500','R$ 0','Integral','Sistema'],
                  ['Edifício Monte Verde','CCB-2026-001235','006/024','15/03/2026','10/04/2026','R$ 10.416,67','R$ 0','R$ 5.000','R$ 5.416,67','Parcial','Júlia Santos'],
                  ['Vila dos Ipês','CCB-2026-001238','010/018','15/07/2026','12/07/2026','R$ 4.444,44','R$ 0','R$ 4.444,44','R$ 0','Integral','Sistema'],
                ].map((row, i) => (
                  <tr key={i} style={{ borderBottom: '1px solid #f3f4f6' }}>

                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{ display: 'flex', gap: 10, marginTop: 16 }}>
            {['CSV','XLSX','PDF'].map(f => (
              <button key={f} style={{ padding: '8px 18px', borderRadius: 7, border: '1px solid #d1d5db', background: '#fff', fontSize: 12.5, cursor: 'pointer', color: '#374151', fontWeight: 500 }}>
                Exportar {f}
              </button>
            ))}
          </div>
        </div>
      )}

      {tipoRel === 'fechamento' && (
        <div>
          <div style={{ display: 'flex', gap: 12, marginBottom: 20 }}>
            <FilterSelect value="" onChange={()=>{}} options={['CondoConta','Quista','Vert']} placeholder="Carteira / Fundo" />
            <input type="month" style={{ padding: '9px 14px', borderRadius: 8, border: '1px solid #d1d5db', fontSize: 13 }} />
          </div>
          <div style={{ background: '#fff', border: '1px solid #e5e7eb', borderRadius: 10, overflow: 'hidden' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12.5 }}>
              <thead>
                <tr style={{ background: '#f9fafb' }}>
                  {['Carteira','Data repasse','Contratos','Valor repassado','Saldo residual pendente'].map((h,i) => (
                    <th key={i} style={{ padding: '10px 14px', textAlign: 'left', fontWeight: 600, color: '#6b7280', fontSize: 10.5, textTransform: 'uppercase', borderBottom: '1px solid #e5e7eb' }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {[
                  ['CondoConta','15/03/2026','3','R$ 45.000,00','R$ 112.500,00'],
                  ['Quista','15/03/2026','2','R$ 25.416,67','R$ 100.000,00'],
                  ['Vert','15/03/2026','1','R$ 13.888,89','R$ 486.111,11'],
                ].map((row, i) => (
                  <tr key={i} style={{ borderBottom: '1px solid #f3f4f6' }}>
                    {row.map((cell, j) => <td key={j} style={{ padding: '10px 14px', color: '#374151', fontVariantNumeric: 'tabular-nums' }}>{cell}</td>)}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{ display: 'flex', gap: 10, marginTop: 16 }}>
            {['CSV','XLSX','PDF'].map(f => (
              <button key={f} style={{ padding: '8px 18px', borderRadius: 7, border: '1px solid #d1d5db', background: '#fff', fontSize: 12.5, cursor: 'pointer', color: '#374151', fontWeight: 500 }}>

}

window.TelaConciliacao = TelaConciliacao;

</script>
  <script type="text/babel">
    // Placeholder screens for non-Contratos tabs
    function PlaceholderTab({ title }) {
      return (
        <div style={{ padding: 60, textAlign: 'center', color: '#9ca3af' }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🚧</div>
          <div style={{ fontSize: 15, fontWeight: 500 }}>{title}</div>
          <div style={{ fontSize: 13, marginTop: 4 }}>Esta aba já existe no CondoSuite atual</div>
        </div>
      );
    }

    function App() {
      const [mainTab, setMainTab] = React.useState(() => localStorage.getItem('cs_maintab') || 'contratos');
      const [subTab, setSubTab] = React.useState(() => localStorage.getItem('cs_subtab') || 'lista');
      const [selectedCond, setSelectedCond] = React.useState(() => {
        const s = localStorage.getItem('cs_cond');
        return s ? Number(s) : null;
      });
      const [viewingDetalhe, setViewingDetalhe] = React.useState(false);
      const [cobrancaData, setCobrancaData] = React.useState(null);
      const [historicoData, setHistoricoData] = React.useState(null);
      const [toast, setToast] = React.useState(null);

      React.useEffect(() => { localStorage.setItem('cs_maintab', mainTab); }, [mainTab]);
      React.useEffect(() => { localStorage.setItem('cs_subtab', subTab); }, [subTab]);
      React.useEffect(() => { if (selectedCond) localStorage.setItem('cs_cond', selectedCond); }, [selectedCond]);

      const selectCond = (id) => { setSelectedCond(id); setViewingDetalhe(true); };
      const goBackToList = () => { setViewingDetalhe(false); setSelectedCond(null); };
      const openCobranca = (cond, parcela) => setCobrancaData({ cond, parcela });
      const openHistorico = (cond, parcela) => setHistoricoData({ cond, parcela });
      const handleCobrancaSuccess = (msg) => { setCobrancaData(null); setToast({ message: msg, type: 'success' }); };

      const handleMainTabChange = (tab) => {
        setMainTab(tab);
        setViewingDetalhe(false);
      };

      return (
        <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
          <SidebarMin />
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
            <TopBar />
            <div style={{ flex: 1, overflow: 'auto' }}>
              {/* Page header */}
              <div style={{ padding: '24px 32px 0' }}>
                <h1 style={{ fontSize: 22, fontWeight: 700, color: '#111827', margin: 0 }}>Crédito Pré-Aprovado</h1>
                <p style={{ fontSize: 13.5, color: '#6b7280', margin: '4px 0 16px' }}>Gestão da carteira de crédito pré-aprovado do time de Crédito & Risco</p>
                <MainTabs active={mainTab} onChange={handleMainTabChange} />
              </div>

              {/* Tab content */}
              <div style={{ padding: '24px 32px' }}>
                {mainTab === 'visogeral' && <PlaceholderTab title="Visão Geral" />}
                {mainTab === 'filacr' && <PlaceholderTab title="Fila C&R" />}
                {mainTab === 'condomnios' && <PlaceholderTab title="Condomínios" />}
                {mainTab === 'contratos' && (
                  <div>
                    {!viewingDetalhe && (
                      <>
                        <SubTabs active={subTab} onChange={setSubTab} />
                        {subTab === 'lista' && <TelaLista onSelectCond={selectCond} />}
                        {subTab === 'conciliacao' && <TelaConciliacao />}
                        {subTab === 'relatorios' && <TelaRelatorios />}
                      </>
                    )}
                    {viewingDetalhe && selectedCond && (
                      <TelaDetalhe condId={selectedCond} onBack={goBackToList} onCobranca={openCobranca} onHistorico={openHistorico} />
                    )}
                  </div>
                )}
              </div>
            </div>
          </div>

          {cobrancaData && <TelaCobranca cond={cobrancaData.cond} parcela={cobrancaData.parcela} onClose={() => setCobrancaData(null)} onSuccess={handleCobrancaSuccess} />}
          {historicoData && <TelaHistorico cond={historicoData.cond} parcela={historicoData.parcela} onClose={() => setHistoricoData(null)} />}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
