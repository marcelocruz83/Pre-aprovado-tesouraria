<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CondoSuite — Gestão de Financiamentos</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'DM Sans', -apple-system, sans-serif; background: #f5f6f8; color: #111827; -webkit-font-smoothing: antialiased; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    table { font-variant-numeric: tabular-nums; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="data.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="tela1-lista.jsx"></script>
  <script type="text/babel" src="tela2-detalhe.jsx"></script>
  <script type="text/babel" src="tela3-cobranca.jsx"></script>
  <script type="text/babel" src="tela4-historico.jsx"></script>
  <script type="text/babel" src="tela5-6.jsx"></script>
  <script type="text/babel">
    function App() {
      const [page, setPage] = React.useState(() => localStorage.getItem('cs_page') || 'lista');
      const [selectedCond, setSelectedCond] = React.useState(() => {
        const s = localStorage.getItem('cs_cond');
        return s ? Number(s) : null;
      });
      const [cobrancaData, setCobrancaData] = React.useState(null);
      const [historicoData, setHistoricoData] = React.useState(null);
      const [toast, setToast] = React.useState(null);

      React.useEffect(() => { localStorage.setItem('cs_page', page); }, [page]);
      React.useEffect(() => { if (selectedCond) localStorage.setItem('cs_cond', selectedCond); }, [selectedCond]);

      const navigate = (p) => { setPage(p); setCobrancaData(null); setHistoricoData(null); };
      const selectCond = (id) => { setSelectedCond(id); setPage('detalhe'); };
      const goBack = () => { setPage('lista'); setSelectedCond(null); };

      const openCobranca = (cond, parcela) => setCobrancaData({ cond, parcela });
      const openHistorico = (cond, parcela) => setHistoricoData({ cond, parcela });

      const handleCobrancaSuccess = (msg) => {
        setCobrancaData(null);
        setToast({ message: msg, type: 'success' });
      };

      return (
        <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
          <Sidebar currentPage={page} onNavigate={navigate} />
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
            <TopBar />
            <div style={{ flex: 1, overflow: 'auto', padding: '24px 32px' }}>
              {page === 'lista' && <TelaLista onSelectCond={selectCond} onNavigate={navigate} />}
              {page === 'detalhe' && selectedCond && <TelaDetalhe condId={selectedCond} onBack={goBack} onCobranca={openCobranca} onHistorico={openHistorico} />}
              {page === 'conciliacao' && <TelaConciliacao />}
              {page === 'relatorios' && <TelaRelatorios />}
            </div>
          </div>

          {cobrancaData && <TelaCobranca cond={cobrancaData.cond} parcela={cobrancaData.parcela} onClose={() => setCobrancaData(null)} onSuccess={handleCobrancaSuccess} />}
          {historicoData && <TelaHistorico cond={historicoData.cond} parcela={historicoData.parcela} onClose={() => setHistoricoData(null)} />}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
